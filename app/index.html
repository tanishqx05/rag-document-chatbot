<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAG Document Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: #ffffff;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 20px;
    }

    .container {
      width: 100%;
      max-width: 780px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1;
    }

    /* Upload section */
    .upload-box {
      background: #1a1d27;
      border: 1.5px dashed #3a3f55;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      transition: border-color 0.2s;
    }
    .upload-box:hover { border-color: #6c63ff; }

    .upload-box input[type="file"] { display: none; }

    .upload-label {
      display: inline-block;
      cursor: pointer;
      background: #6c63ff;
      color: white;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s;
    }
    .upload-label:hover { background: #5a52e0; }

    .upload-status {
      margin-top: 10px;
      font-size: 0.82rem;
      color: #aaa;
      min-height: 18px;
    }
    .upload-status.success { color: #4caf82; }
    .upload-status.error { color: #f06060; }

    /* Chat section */
    .chat-box {
      background: #1a1d27;
      border-radius: 12px;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #2a2d3e;
      min-height: 320px;
    }

    .chat-header {
      padding: 12px 18px;
      border-bottom: 1px solid #2a2d3e;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-header span {
      font-size: 0.85rem;
      color: #888;
    }

    .clear-btn {
      background: none;
      border: 1px solid #3a3f55;
      color: #aaa;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .clear-btn:hover { border-color: #f06060; color: #f06060; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.88rem;
      line-height: 1.55;
    }

    .message.user {
      align-self: flex-end;
      background: #6c63ff;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: #252837;
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
    }

    .message.system {
      align-self: center;
      background: none;
      color: #666;
      font-size: 0.78rem;
      font-style: italic;
    }

    .typing {
      align-self: flex-start;
      background: #252837;
      padding: 10px 16px;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      font-size: 0.88rem;
      color: #888;
    }

    /* Input section */
    .input-row {
      display: flex;
      gap: 10px;
      padding: 14px 18px;
      border-top: 1px solid #2a2d3e;
      background: #1a1d27;
    }

    .input-row input {
      flex: 1;
      background: #0f1117;
      border: 1px solid #3a3f55;
      color: #e0e0e0;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: #6c63ff; }
    .input-row input::placeholder { color: #555; }

    .send-btn {
      background: #6c63ff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .send-btn:hover { background: #5a52e0; }
    .send-btn:disabled { background: #3a3f55; cursor: not-allowed; }

    /* Scrollbar */
    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #3a3f55; border-radius: 4px; }
  </style>
</head>
<body>

  <h1>📄 RAG Document Chatbot</h1>
  <p class="subtitle">Upload a PDF and ask questions about it</p>

  <div class="container">

    <!-- Upload -->
    <div class="upload-box">
      <label class="upload-label" for="pdfInput">📁 Choose PDF</label>
      <input type="file" id="pdfInput" accept=".pdf" onchange="uploadPDF(this)" />
      <div class="upload-status" id="uploadStatus">No file uploaded yet</div>
    </div>

    <!-- Chat -->
    <div class="chat-box">
      <div class="chat-header">
        <span id="docLabel">No document loaded</span>
        <button class="clear-btn" onclick="clearSession()">Clear Chat</button>
      </div>
      <div class="messages" id="messages">
        <div class="message system">Upload a PDF to start chatting</div>
      </div>
      <div class="input-row">
        <input type="text" id="questionInput" placeholder="Ask a question about the document..."
          onkeydown="if(event.key==='Enter') sendQuestion()" disabled />
        <button class="send-btn" id="sendBtn" onclick="sendQuestion()" disabled>Send</button>
      </div>
    </div>

  </div>

  <script>
    let documentLoaded = false;

    async function uploadPDF(input) {
      const file = input.files[0];
      if (!file) return;

      const status = document.getElementById('uploadStatus');
      status.className = 'upload-status';
      status.textContent = `Uploading ${file.name}...`;

      const formData = new FormData();
      formData.append('file', file);

      try {
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();

        if (res.ok) {
          status.className = 'upload-status success';
          status.textContent = `✓ ${file.name} — ${data.chunks} chunks, ${data.characters.toLocaleString()} characters`;
          document.getElementById('docLabel').textContent = `📄 ${file.name}`;
          document.getElementById('questionInput').disabled = false;
          document.getElementById('sendBtn').disabled = false;
          documentLoaded = true;
          addMessage('system', `Document loaded! Ask me anything about "${file.name}"`);
        } else {
          status.className = 'upload-status error';
          status.textContent = `✗ Error: ${data.detail}`;
        }
      } catch (e) {
        status.className = 'upload-status error';
        status.textContent = '✗ Upload failed. Is the server running?';
      }
    }

    async function sendQuestion() {
      const input = document.getElementById('questionInput');
      const question = input.value.trim();
      if (!question || !documentLoaded) return;

      input.value = '';
      document.getElementById('sendBtn').disabled = true;

      addMessage('user', question);

      // Show typing indicator
      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.id = 'typing';
      typing.textContent = 'Thinking...';
      document.getElementById('messages').appendChild(typing);
      scrollToBottom();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });
        const data = await res.json();

        document.getElementById('typing')?.remove();

        if (res.ok) {
          addMessage('assistant', data.answer);
        } else {
          addMessage('system', `Error: ${data.detail}`);
        }
      } catch (e) {
        document.getElementById('typing')?.remove();
        addMessage('system', 'Request failed. Please try again.');
      }

      document.getElementById('sendBtn').disabled = false;
      input.focus();
    }

    async function clearSession() {
      await fetch('/clear', { method: 'POST' });
      document.getElementById('messages').innerHTML = '<div class="message system">Chat cleared. Upload a new PDF to start again.</div>';
      document.getElementById('questionInput').disabled = true;
      document.getElementById('sendBtn').disabled = true;
      document.getElementById('docLabel').textContent = 'No document loaded';
      document.getElementById('uploadStatus').textContent = 'No file uploaded yet';
      document.getElementById('uploadStatus').className = 'upload-status';
      documentLoaded = false;
    }

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.textContent = text;
      document.getElementById('messages').appendChild(div);
      scrollToBottom();
    }

    function scrollToBottom() {
      const msgs = document.getElementById('messages');
      msgs.scrollTop = msgs.scrollHeight;
    }
  </script>

</body>
</html>
